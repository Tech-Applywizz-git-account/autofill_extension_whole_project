services:
  - type: web
    name: ai-autofill-service
    env: python
    region: oregon
    # ⬆️ IMPORTANT: Upgrade to at least "starter" (1 vCPU / 1GB RAM) for stability with 150+ users
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: >
      gunicorn app:app
      --worker-class uvicorn.workers.UvicornWorker
      --bind 0.0.0.0:$PORT
      --workers 2
      --threads 4
      --timeout 180
      --graceful-timeout 30
      --keep-alive 5
      --max-requests 500
      --max-requests-jitter 100
    envVars:
      - key: AWS_ACCESS_KEY_ID
        sync: false  # Manually set in Render dashboard
      - key: AWS_SECRET_ACCESS_KEY
        sync: false  # Manually set in Render dashboard
      - key: AWS_REGION
        value: us-east-1
      - key: BEDROCK_MODEL_ID
        value: us.amazon.nova-lite-v1:0
      - key: PORT
        value: 8001
